# Explicit project name. Without this, compose defaults the project
# name to the parent directory name ("repo"), which collides with an
# unrelated project on this dev machine that *also* lives in a folder
# named "repo" — that other project happens to be a PHP app, and its
# builds kept overwriting our `repo-backend:latest` tag with a PHP
# image. Using a unique name isolates our image tags and container
# names ("hospitalityops-backend:latest", "hospitalityops-backend-1",
# etc.) so cross-project clobbering can't happen.
name: hospitalityops

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospitality_ops
    # No host port binding: this dev machine already has a native
    # postgres listening on 5432, and Docker Desktop on Windows handles
    # port collisions poorly (the container silently exits (0) instead
    # of failing loudly). Other compose services reach postgres via the
    # internal `postgres:5432` hostname on the compose network. If you
    # ever need host access, use `docker compose exec postgres psql`.
    volumes:
      - pg_data:/var/lib/postgresql/data
    # The first time this project boots a fresh `hospitalityops_pg_data`
    # volume, postgres runs `initdb` from scratch — on Docker Desktop's
    # WSL-backed filesystem this can take 30–90 seconds, well past the
    # previous 60s healthcheck budget. Bumping to 300s total
    # (start_period 60s + 60*4s = 240s interval retries = 300s) keeps
    # cold-start runs from hitting "dependency failed to start: postgres
    # is unhealthy" while still catching genuinely broken containers.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospitality_ops"]
      interval: 4s
      timeout: 5s
      retries: 60
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Same reason as postgres above — host already has a native redis
    # on 6379. Access redis via the `redis:6379` hostname inside the
    # compose network; use `docker compose exec redis redis-cli` for
    # host-side debugging.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Compose needs an explicit healthcheck on the backend so e2e-test can
    # wait with `condition: service_healthy` instead of the script polling
    # the /health endpoint out-of-band. The backend image installs curl.
    #
    # Use 127.0.0.1 (not `localhost`) to avoid IPv6/IPv4 name-resolution
    # ambiguity inside the alpine container — Fastify binds to 0.0.0.0
    # (IPv4 only), so if `localhost` resolved to ::1 the curl would fail.
    #
    # Budget: start_period (60s) + retries*interval (60 * 5s = 300s) =
    # 360s total. The previous 120s budget timed out on cold starts
    # under Docker Desktop's slow WSL VHD disk I/O (compose would then
    # abort the e2e-test stage with "dependency failed to start:
    # container repo-backend-1 is unhealthy").
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hospitality_ops
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-min-32-chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-min-32-chars
      JWT_ACCESS_TTL_MINUTES: "45"
      JWT_REFRESH_TTL_DAYS: "10"
      ENCRYPTION_KEY_HEX: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      UPLOAD_ROOT: /app/uploads
      UPLOAD_MAX_MB: "25"
      UPLOAD_ALLOWED_MIME: "application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,image/png,image/jpeg,image/gif,image/webp"
      REDIS_URL: redis://redis:6379
      CACHE_MODE: redis
      ENABLE_SSR: "false"
      ENABLE_TLS: "false"
      BACKUP_ROOT: /app/backups
      BACKUP_RETENTION_DAYS: "30"
      SNAPSHOT_CRON: "0 23 * * *"
      KEY_CLEANUP_CRON: "0 2 * * *"
      CB_TIMEOUT_MS: "5000"
      CB_ERROR_THRESHOLD_PERCENT: "10"
      CB_ROLLING_WINDOW_MS: "60000"
      CB_RESET_TIMEOUT_MS: "30000"
      DRY_RUN_EXTERNAL_STUBS: "true"
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://backend:3000
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000

volumes:
  pg_data:
  uploads:
  backups:
