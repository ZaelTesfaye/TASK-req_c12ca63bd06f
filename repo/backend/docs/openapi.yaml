  # ── Check-in ──────────────────────────────────────────
  /check-in:
    post:
      tags: [Check-in]
      summary: Process a check-in (tablet interface)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entitlement_id, idempotency_key]
              properties:
                entitlement_id:
                  type: string
                  format: uuid
                idempotency_key:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Check-in successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [checked_in, already_checked_in]
                  entitlement:
                    $ref: '#/components/schemas/Entitlement'
        '400':
          description: Invalid entitlement or already redeemed with different key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

