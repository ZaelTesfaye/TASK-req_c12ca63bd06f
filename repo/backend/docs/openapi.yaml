            type: string
            format: uuid
      responses:
        '200':
          description: Entitlement verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  entitlement:
                    $ref: '#/components/schemas/Entitlement'
                  reason:
                    type: string

