    put:
      tags: [Catalog]
      summary: Update resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                attributes:
                  type: object
      responses:
        '200':
          description: Resource updated

  /catalog/resources/{id}/publish:
    post:
      tags: [Catalog]
      summary: Publish a resource
      parameters:
        - name: id
          in: path
          required: true
