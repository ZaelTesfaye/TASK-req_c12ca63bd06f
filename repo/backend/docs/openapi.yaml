            type: string
            format: uuid
      responses:
        '200':
          description: Resource published

  /catalog/resources/{id}/unpublish:
    post:
      tags: [Catalog]
      summary: Unpublish a resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource unpublished

  /catalog/templates:
    get:
      tags: [Catalog]
      summary: List resource templates
      responses:
        '200':
