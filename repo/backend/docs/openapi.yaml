openapi: 3.0.3
info:
  title: Hospitality Operations Management System API
  description: Backend API for managing events, resources, reservations, recipes, inventory, entitlements, and operational workflows.
  version: 1.0.0

servers:
  - url: /api
    description: API base path

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from POST /auth/login or POST /auth/refresh.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error description.
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
      required:
        - error
        - message

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        pagination:
          type: object
          properties:
            cursor:
              type: string
              nullable: true
            hasMore:
              type: boolean
            total:
              type: integer

    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, submitted, approved, in_service, closed]
        budget:
          type: number
        created_by:
          type: string
          format: uuid
        service_windows:
          type: array
          items:
            $ref: '#/components/schemas/ServiceWindow'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ServiceWindow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        label:
          type: string

    Approval:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subject_type:
          type: string
        subject_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, rejected]
        requested_by:
          type: string
          format: uuid
        resolved_by:
          type: string
          format: uuid
          nullable: true
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true

    Reservation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        resource_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [requested, approved, released, occupied, returned, overtime_pending, cancelled, rescheduled, renewed]
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RecipeVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        recipe_id:
          type: string
          format: uuid
        version_number:
          type: integer
        title:
          type: string
        ingredients:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              quantity:
                type: number
              unit:
                type: string
        steps:
          type: array
          items:
            type: string
        yield_amount:
          type: number
        yield_unit:
          type: string
        allergens:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, submitted, approved, rejected]
        created_at:
          type: string
          format: date-time

    InventorySnapshot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        snapshot_date:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
            properties:
              item_id:
                type: string
                format: uuid
              expected_quantity:
                type: number
              actual_quantity:
                type: number
              gap:
                type: number
        created_at:
          type: string
          format: date-time

    Entitlement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type_id:
          type: string
          format: uuid
        holder_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [active, redeemed, expired, revoked]
        issued_at:
          type: string
          format: date-time
        redeemed_at:
          type: string
          format: date-time
          nullable: true
        idempotency_key:
          type: string
          nullable: true

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parent_type:
          type: string
        parent_id:
          type: string
          format: uuid
        filename:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        uploaded_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    Resource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, published, unpublished]
        attributes:
          type: object
        created_at:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        subject_type:
          type: string
        subject_id:
          type: string
          format: uuid
        action:
          type: string
        metadata:
          type: object
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time

paths:
  # ── Auth ──────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user (username + password; no email)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 100
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '201':
          description: User created. Returns the new user envelope; tokens are obtained via POST /auth/login.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      username:
                        type: string
                      status:
                        type: string
                        enum: [active, inactive, suspended]
                      roles:
                        type: array
                        items:
                          type: string
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate with username + password and obtain JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required: [accessToken, refreshToken, expiresIn, user]
                properties:
                  accessToken:
                    type: string
                    description: "JWT access token. Pass as `Authorization: Bearer <accessToken>`."
                  refreshToken:
                    type: string
                    description: Opaque UUID refresh token. Use with POST /auth/refresh.
                  expiresIn:
                    type: integer
                    description: Access-token lifetime in seconds.
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      username:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                      permissions:
                        type: array
                        items:
                          type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: integer
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate refresh token
      responses:
        '204':
          description: Logged out
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  status:
                    type: string
                    enum: [active, inactive, suspended]
                  roles:
                    type: array
                    items:
                      type: string
                  permissions:
                    type: array
                    items:
                      type: string

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '204':
          description: Password changed
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Events ────────────────────────────────────────────
  /events:
    get:
      tags: [Events]
      summary: List events (filtered by role/ownership)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, approved, in_service, closed]
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated event list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Event'
    post:
      tags: [Events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
                budget:
                  type: number
                service_windows:
                  type: array
                  items:
                    type: object
                    properties:
                      start_time:
                        type: string
                        format: date-time
                      end_time:
                        type: string
                        format: date-time
                      label:
                        type: string
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}:
    get:
      tags: [Events]
      summary: Get event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Events]
      summary: Update event (Draft state only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                budget:
                  type: number
                service_windows:
                  type: array
                  items:
                    type: object
                    properties:
                      start_time:
                        type: string
                        format: date-time
                      end_time:
                        type: string
                        format: date-time
                      label:
                        type: string
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Validation error or invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/submit:
    post:
      tags: [Events]
      summary: Submit event for approval
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Validation error (missing fields, invalid state)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/service:
    post:
      tags: [Events]
      summary: Transition event to In Service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event in service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/close:
    post:
      tags: [Events]
      summary: Close event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Invalid state transition or unresolved items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/materials:
    get:
      tags: [Events]
      summary: Get materials list for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Materials list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        quantity:
                          type: number
                        unit:
                          type: string
    put:
      tags: [Events]
      summary: Update materials list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                materials:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      quantity:
                        type: number
                      unit:
                        type: string
      responses:
        '200':
          description: Materials updated

  /events/{id}/resource-requests:
    get:
      tags: [Events]
      summary: List resource requests for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource requests
    post:
      tags: [Events]
      summary: Create a resource request for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resource_id, quantity]
              properties:
                resource_id:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                notes:
                  type: string
      responses:
        '201':
          description: Resource request created
        '400':
          description: Validation error or quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Approvals ─────────────────────────────────────────
  /approvals:
    get:
      tags: [Approvals]
      summary: List pending approvals for current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: subject_type
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated approvals
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Approval'

  /approvals/{id}/approve:
    post:
      tags: [Approvals]
      summary: Approve a pending request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Approval'
        '400':
          description: Already resolved or self-approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /approvals/{id}/reject:
    post:
      tags: [Approvals]
      summary: Reject a pending request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Approval'
        '400':
          description: Already resolved or self-approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Reservations ──────────────────────────────────────
  /reservations:
    get:
      tags: [Reservations]
      summary: List reservations (filtered by scope)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: event_id
          in: query
          schema:
            type: string
            format: uuid
        - name: resource_id
          in: query
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated reservations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Reservation'
    post:
      tags: [Reservations]
      summary: Request a new reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id, resource_id, start_time, end_time]
              properties:
                event_id:
                  type: string
                  format: uuid
                resource_id:
                  type: string
                  format: uuid
                start_time:
                  type: string
                  format: date-time
                end_time:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Reservation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '400':
          description: Validation error or conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reservations/{id}:
    get:
      tags: [Reservations]
      summary: Get reservation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reservation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /reservations/{id}/approve:
    post:
      tags: [Reservations]
      summary: Approve a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reservation approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /reservations/{id}/release:
    post:
      tags: [Reservations]
      summary: Release resource for use
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource released

  /reservations/{id}/occupy:
    post:
      tags: [Reservations]
      summary: Mark resource as occupied
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource occupied

  /reservations/{id}/return:
    post:
      tags: [Reservations]
      summary: Return resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                condition:
                  type: string
      responses:
        '200':
          description: Resource returned

  /reservations/{id}/overtime-approve:
    post:
      tags: [Reservations]
      summary: Approve overtime for a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Overtime approved

  /reservations/{id}/cancel:
    post:
      tags: [Reservations]
      summary: Cancel a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Reservation cancelled

  /reservations/{id}/reschedule:
    post:
      tags: [Reservations]
