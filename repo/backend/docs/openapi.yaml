      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_time, end_time]
              properties:
                start_time:
                  type: string
                  format: date-time
                end_time:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Reservation rescheduled

  # ── Recipes ───────────────────────────────────────────
  /recipes:
    get:
      tags: [Recipes]
      summary: List recipes
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated recipes
    post:
      tags: [Recipes]
      summary: Create a new recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Recipe created

  /recipes/{id}:
    get:
      tags: [Recipes]
      summary: Get recipe with versions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Recipe details with version history

  /recipes/{id}/versions:
    post:
      tags: [Recipes]
      summary: Create a new version of a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ingredients, steps, yield_amount, yield_unit, allergens]
              properties:
                ingredients:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      quantity:
                        type: number
                      unit:
                        type: string
                steps:
                  type: array
                  items:
                    type: string
                yield_amount:
                  type: number
                yield_unit:
                  type: string
                allergens:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeVersion'

  /recipes/{recipeId}/versions/{versionId}/submit:
    post:
      tags: [Recipes]
      summary: Submit version for review
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Version submitted

  /recipes/{recipeId}/versions/{versionId}/approve:
    post:
      tags: [Recipes]
      summary: Approve a recipe version
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Version approved

  /recipes/{recipeId}/versions/{versionId}/reject:
    post:
      tags: [Recipes]
      summary: Reject a recipe version
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Version rejected

  # ── Inventory ─────────────────────────────────────────
  /inventory/snapshots:
    get:
      tags: [Inventory]
      summary: List inventory snapshots
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated snapshots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/InventorySnapshot'

  /inventory/snapshots/{id}:
    get:
      tags: [Inventory]
      summary: Get snapshot details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Snapshot details

  /inventory/gaps:
    get:
      tags: [Inventory]
      summary: List unresolved inventory gaps
      responses:
        '200':
          description: Gap list

  /inventory/gaps/{id}/resolve:
    post:
      tags: [Inventory]
      summary: Resolve an inventory gap
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolution_method, notes]
              properties:
                resolution_method:
                  type: string
                  enum: [recount, adjustment, write_off]
                notes:
                  type: string
      responses:
        '200':
          description: Gap resolved

  /inventory/export:
    get:
      tags: [Inventory]
      summary: Export inventory data
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Exported data
          content:
            text/csv: {}
            application/json: {}

  # ── Entitlements ──────────────────────────────────────
  /entitlements:
    get:
      tags: [Entitlements]
      summary: List entitlements
      parameters:
        - name: holder_id
          in: query
          schema:
            type: string
            format: uuid
        - name: event_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, redeemed, expired, revoked]
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated entitlements
    post:
      tags: [Entitlements]
      summary: Issue an entitlement (manual)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type_id, holder_id]
              properties:
                type_id:
                  type: string
                  format: uuid
                holder_id:
                  type: string
                  format: uuid
                event_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Entitlement issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entitlement'

  /entitlements/bulk-import:
    post:
      tags: [Entitlements]
      summary: Bulk import entitlements via CSV
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        row:
                          type: integer
                        message:
                          type: string

  /entitlements/{id}/redeem:
    post:
      tags: [Entitlements]
      summary: Redeem an entitlement (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idempotency_key]
              properties:
                idempotency_key:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Entitlement redeemed (or already redeemed with same key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entitlement'
        '400':
          description: Already redeemed with different key or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /entitlements/types:
    get:
      tags: [Entitlements]
      summary: List entitlement types
      responses:
        '200':
          description: Entitlement types
    post:
      tags: [Entitlements]
      summary: Create entitlement type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Type created

  # ── Attachments ───────────────────────────────────────
  /attachments:
    post:
      tags: [Attachments]
      summary: Upload an attachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, parent_type, parent_id]
              properties:
                file:
                  type: string
                  format: binary
                parent_type:
                  type: string
                  enum: [event, recipe_version]
                parent_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '400':
          description: Invalid file type or size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /attachments/{id}:
    get:
      tags: [Attachments]
      summary: Download attachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File content
          content:
            application/octet-stream: {}
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Attachments]
      summary: Delete attachment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

