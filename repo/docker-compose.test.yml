services:
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hospitality_ops
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-min-32-chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-min-32-chars
      JWT_ACCESS_TTL_MINUTES: "45"
      JWT_REFRESH_TTL_DAYS: "10"
      ENCRYPTION_KEY_HEX: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      UPLOAD_ROOT: /app/uploads
      UPLOAD_MAX_MB: "25"
      UPLOAD_ALLOWED_MIME: "application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,image/png,image/jpeg,image/gif,image/webp"
      REDIS_URL: redis://redis:6379
      CACHE_MODE: redis
      ENABLE_SSR: "false"
      ENABLE_TLS: "false"
      BACKUP_ROOT: /app/backups
      BACKUP_RETENTION_DAYS: "30"
      SNAPSHOT_CRON: "0 23 * * *"
      KEY_CLEANUP_CRON: "0 2 * * *"
      CB_TIMEOUT_MS: "5000"
      CB_ERROR_THRESHOLD_PERCENT: "10"
      CB_ROLLING_WINDOW_MS: "60000"
      CB_RESET_TIMEOUT_MS: "30000"
      DRY_RUN_EXTERNAL_STUBS: "true"
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://backend:3000

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    environment:
      VITE_API_URL: http://localhost:3000

  # Override the dev frontend so that the browser (running inside the
  # Playwright container on the same docker-compose network) can reach
  # the backend by its service hostname rather than via 'localhost'
  # (which refers to the browser's own container, not the docker host).
  frontend:
    environment:
      VITE_API_URL: http://backend:3000

  e2e-test:
    # Previously this service used the bare Playwright image and did
    # `npm ci && npx playwright install --with-deps chromium && npx
    # playwright test` on every invocation — roughly 3–8 minutes of
    # silent startup before a single test ran, and the log cut off at
    # "Waiting for services to start..." because callers thought it was
    # stuck. Dockerfile.e2e bakes `npm ci` into the build layer, and
    # the Playwright base image already ships Chromium, so this run is
    # now straight-to-test.
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    # Share the frontend container's network namespace. Previously this
    # service was on the default compose network, and Chromium inside
    # it failed every `page.goto('http://frontend:5173/...')` with
    # `net::ERR_NAME_NOT_RESOLVED` — a well-known Docker-Desktop quirk
    # where Chromium's internal resolver can't reach the embedded DNS
    # at 127.0.0.11 even though the container's /etc/resolv.conf does.
    # With `network_mode: service:frontend`, the e2e-test container
    # shares the frontend's network stack, so the frontend is reachable
    # at localhost:5173 and `backend` resolves via the shared DNS.
    network_mode: "service:frontend"
    environment:
      PLAYWRIGHT_BASE_URL: http://localhost:5173
      BACKEND_URL: http://backend:3000
      CI: "true"
